<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Dragon's Flagon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #1c1917; /* stone-900 */
        color: #f5f5f4; /* stone-100 */
        font-family: 'Cinzel', serif;
        overflow: hidden;
      }
      .font-gothic {
        font-family: 'UnifrakturCook', cursive;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #292524;
      }
      ::-webkit-scrollbar-thumb {
        background: #78350f;
        border-radius: 4px;
      }
      .perspective-1000 {
        perspective: 1000px;
      }
      .preserve-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
      /* Wood Texture approximation with gradients */
      .wood-texture {
        background: repeating-linear-gradient(
          45deg,
          #271c19,
          #271c19 10px,
          #322421 10px,
          #322421 20px
        );
      }

      /* Text Shadows for Floating Text */
      .text-shadow-gold {
          text-shadow: 2px 2px 0px #78350f, -1px -1px 0 #000;
      }
      .text-shadow-red {
          text-shadow: 2px 2px 0px #450a0a, -1px -1px 0 #000;
      }
      .text-shadow-black {
          text-shadow: 2px 2px 0px #000;
      }

      /* --- ANIMATION KEYFRAMES --- */

      /* Screen Shake */
      @keyframes shake {
        0% { transform: translate(1px, 1px) rotate(0deg); }
        10% { transform: translate(-1px, -2px) rotate(-1deg); }
        20% { transform: translate(-3px, 0px) rotate(1deg); }
        30% { transform: translate(3px, 2px) rotate(0deg); }
        40% { transform: translate(1px, -1px) rotate(1deg); }
        50% { transform: translate(-1px, 2px) rotate(-1deg); }
        60% { transform: translate(-3px, 1px) rotate(0deg); }
        70% { transform: translate(3px, 1px) rotate(-1deg); }
        80% { transform: translate(-1px, -1px) rotate(1deg); }
        90% { transform: translate(1px, 2px) rotate(0deg); }
        100% { transform: translate(1px, -2px) rotate(-1deg); }
      }
      .animate-shake {
        animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
      }

      /* Card Slam - Improved with recoil */
      @keyframes slam {
        0% { transform: scale(1.6) translateZ(150px) rotateX(15deg); opacity: 0; }
        60% { transform: scale(0.9) translateZ(0) rotateX(-5deg); opacity: 1; }
        80% { transform: scale(1.05) translateZ(0) rotateX(2deg); }
        100% { transform: scale(1) translateZ(0) rotateX(0); }
      }
      .animate-slam {
        animation: slam 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      /* Card Play - Player (From Bottom Hand to Table) */
      @keyframes play-player {
        0% { transform: translateY(200px) scale(0.8) rotateX(20deg); opacity: 0; }
        70% { transform: translateY(-10px) scale(1.05) rotateX(-5deg); opacity: 1; }
        100% { transform: translateY(0) scale(1) rotateX(0); }
      }
      .animate-play-player {
        animation: play-player 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      /* Card Play - Opponent (From Top Hand to Table) */
      @keyframes play-opponent {
        0% { transform: translateY(-200px) scale(0.8) rotateX(-20deg); opacity: 0; }
        70% { transform: translateY(10px) scale(1.05) rotateX(5deg); opacity: 1; }
        100% { transform: translateY(0) scale(1) rotateX(0); }
      }
      .animate-play-opponent {
        animation: play-opponent 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      /* Draw Card - Player (From Right Deck to Bottom Hand) */
      /* Approximate: Deck is Right-Center, Hand is Bottom-Center */
      @keyframes draw-hand {
        0% { transform: translate(40vw, -40vh) scale(0.3) rotate(60deg); opacity: 0; }
        50% { opacity: 1; }
        70% { transform: translate(0, 0) scale(1.1) rotate(-8deg); }
        100% { transform: scale(1) rotate(0); }
      }
      .animate-draw-hand {
        animation: draw-hand 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      /* Draw Card - Opponent (From Right Deck to Top Hand) */
      @keyframes draw-opponent {
        0% { transform: translate(40vw, 40vh) scale(0.3) rotate(60deg); opacity: 0; }
        100% { transform: translate(0, 0) scale(1) rotate(0); opacity: 1; }
      }
      .animate-draw-opponent {
        animation: draw-opponent 0.6s ease-out forwards;
      }

      /* Discard Card - Spin into pile */
      @keyframes discard-in {
        0% { transform: translate(-20vw, 0) scale(1.2) rotate(-20deg); opacity: 0; }
        100% { transform: translate(0, 0) scale(1) rotate(3deg); opacity: 1; }
      }
      .animate-discard-in {
        animation: discard-in 0.5s ease-out forwards;
      }

      /* Pulse Glow (Power Trigger) */
      @keyframes pulse-glow {
        0% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0.7); }
        70% { box-shadow: 0 0 0 20px rgba(250, 204, 21, 0); }
        100% { box-shadow: 0 0 0 0 rgba(250, 204, 21, 0); }
      }
      .animate-pulse-glow {
        animation: pulse-glow 1.5s infinite;
      }

      /* Coin Float */
      @keyframes float-coin {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-50px); opacity: 0; }
      }
      .animate-float-coin {
        animation: float-coin 1s ease-out forwards;
      }

      /* Floating Text (Damage Numbers) */
      @keyframes float-up {
        0% { transform: translateY(0) scale(1); opacity: 0; }
        20% { opacity: 1; transform: translateY(-20px) scale(1.2); }
        100% { transform: translateY(-80px) scale(1); opacity: 0; }
      }
      .animate-float-up {
        animation: float-up 2s ease-out forwards;
      }

      /* Slide In Banner */
      @keyframes slide-in {
        0% { transform: translateX(-100%) skewX(-12deg); opacity: 0; }
        100% { transform: translateX(0) skewX(-12deg); opacity: 1; }
      }
      .animate-slide-in {
        animation: slide-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      /* --- SPECIAL VFX KEYFRAMES --- */

      /* Divine Rays Rotation */
      @keyframes divine-spin {
        0% { transform: rotate(0deg) scale(1); opacity: 0; }
        20% { opacity: 0.8; }
        80% { opacity: 0.8; }
        100% { transform: rotate(180deg) scale(1.5); opacity: 0; }
      }
      .animate-divine-spin {
        animation: divine-spin 1.5s ease-in-out forwards;
      }

      /* Fire Pulse */
      @keyframes fire-pulse {
        0% { box-shadow: inset 0 0 0 0 rgba(220, 38, 38, 0); opacity: 0; }
        20% { box-shadow: inset 0 0 100px 50px rgba(220, 38, 38, 0.6); opacity: 1; }
        100% { box-shadow: inset 0 0 200px 0 rgba(220, 38, 38, 0); opacity: 0; }
      }
      .animate-fire-pulse {
        animation: fire-pulse 1s ease-out forwards;
      }

      /* Slash Action */
      @keyframes slash-draw {
        0% { stroke-dashoffset: 1000; opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0; }
      }
      .animate-slash-draw {
        animation: slash-draw 0.4s ease-out forwards;
      }

      /* Chromatic Shift (Tiamat) */
      @keyframes chromatic-shift {
        0% { filter: hue-rotate(0deg) contrast(1.2); }
        50% { filter: hue-rotate(180deg) contrast(1.5); transform: scale(1.02); }
        100% { filter: hue-rotate(360deg) contrast(1.2); }
      }
      .animate-chromatic {
        animation: chromatic-shift 1s linear infinite;
      }

    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
